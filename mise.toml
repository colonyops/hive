[tools]
# Go Tools
"go" = "1.26"
"go:github.com/wailsapp/wails/v3/cmd/wails3" = "v3.0.0-alpha2.116"
"go:golang.org/x/tools/cmd/deadcode" = "latest"
"go:github.com/abice/go-enum" = "v0.9.4"
"github:hay-kot/gobusgen" = "v0.3.0"
"github:sqlc-dev/sqlc" = "v1.31.1"
golangci-lint = "2.12.2"
"goreleaser" = "latest"

# Docs Site Tools
uv = "latest"
"pipx:zensical" = "latest"

[env]
HIVE_LOG_LEVEL = "debug"
HIVE_LOG_FILE = "./dev.log"

[tasks."generate:enums"]
description = "Generate enum methods using go-enum"
sources = ["internal/core/action/type.go", "internal/core/hc/item.go", "internal/core/notify/store.go", "internal/core/todo/todo.go", "internal/sources/backend.go"]
outputs = ["internal/core/action/type_enum.go", "internal/core/hc/item_enum.go", "internal/core/notify/store_enum.go", "internal/core/todo/todo_enum.go", "internal/sources/backend_enum.go"]
run = "go-enum --nocase --names --marshal -f internal/core/action/type.go -f internal/core/hc/item.go -f internal/core/notify/store.go -f internal/core/todo/todo.go -f internal/sources/backend.go"

[tasks.generate]
description = "Run all code generators"
depends = ["generate:enums"]
sources = [
  "internal/core/eventbus/events.go",
  "internal/data/db/queries/queries.sql",
  "internal/data/db/queries/queries_hc.sql",
  "internal/data/db/migrations/*.up.sql",
  "internal/desktop/pipeline/pipelinedb/queries/queries.sql",
  "internal/desktop/pipeline/pipelinedb/migrations/*.up.sql",
  "sqlc.yaml",
]
outputs = [
  "internal/core/eventbus/eventbus.gen.go",
  "internal/data/db/db.go",
  "internal/data/db/models.go",
  "internal/data/db/queries.sql.go",
  "internal/data/db/queries_hc.sql.go",
  "internal/desktop/pipeline/pipelinedb/db.go",
  "internal/desktop/pipeline/pipelinedb/models.go",
  "internal/desktop/pipeline/pipelinedb/queries.sql.go",
]
run = ["go generate ./...", "sqlc generate"]

[tasks.start]
alias = "default"
description = "Run hive with global config (supports CLI args)"
depends = ["generate"]
run = "go run ."

[tasks.dev]
description = "Run hive with dev config (supports CLI args)"
depends = ["generate"]
env = { HIVE_LOG_LEVEL = "debug", HIVE_LOG_FILE = "./dev.log", HIVE_CONFIG = "./dev/config.dev.yaml", HIVE_DATA_DIR = "./.data" }
run = "go run ."

[tasks.build]
description = "Build with goreleaser"
depends = ["generate"]
run = "goreleaser build --snapshot --clean"

[tasks.test]
description = "Run all go tests"
run = "go test ./..."

[tasks.coverage]
description = "Run tests with race detection and coverage"
quiet = true
run = "go test -race -coverprofile=coverage.out -covermode=atomic ./... -v -cover"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Run golangci-lint fmt"
run = "golangci-lint fmt ./..."

[tasks.deadcode]
description = "Check for unreachable code"
run = "deadcode -test ./..."

[tasks.check]
description = "Run tidy, lint, test, and deadcode"
run = ["go mod tidy", { tasks = ["lint", "test", "deadcode"] }]

[tasks.validate]
description = "Run doctor with dev config"
env = { HIVE_CONFIG = "./dev/config.dev.yaml" }
run = "go run . doctor"

[tasks."validate:invalid"]
description = "Run doctor with intentionally invalid config"
env = { HIVE_CONFIG = "./dev/config.invalid.yaml" }
run = "go run . doctor || true"

[tasks."desktop:dev"]
description = "Run the desktop app in dev mode (wails3 dev). Picks a free Vite port so instances run concurrently; injects the git branch for the dev bar."
dir = "desktop"
run = """
port="$(./build/scripts/dev-port.sh)"
branch="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo unknown)"
echo "hive desktop dev: vite port ${port}, branch ${branch}"
WAILS_VITE_PORT="${port}" VITE_HIVE_DEV_BRANCH="${branch}" wails3 dev -config ./build/config.yml
"""

[tasks."desktop:build"]
description = "Build the desktop app"
dir = "desktop"
run = "wails3 build"

[tasks."desktop:icons"]
description = "Regenerate desktop icon assets from SVG masters"
dir = "desktop"
run = "./build/icons/generate.sh"

[tasks."desktop:generate"]
description = "Regenerate desktop TS bindings"
dir = "desktop"
run = "wails3 generate bindings -clean=true -ts -i"

[tasks."desktop:serve"]
description = "Build and run the desktop app as a headless HTTP server (server build)"
# The server binary embeds frontend/dist, so the frontend must be built first —
# a fresh clone's dist contains only .gitkeep. Port override: WAILS_SERVER_PORT.
run = [
  "cd desktop/frontend && npm run build",
  "go build -tags server -o ./desktop/bin/hive-desktop-server ./desktop",
  "./desktop/bin/hive-desktop-server",
]

[tasks."desktop:test"]
description = "Run desktop frontend + Go tests"
run = ["cd desktop/frontend && npm test", "go test ./desktop/..."]

[tasks."desktop:e2e"]
description = "Run desktop e2e tests (Playwright vs server build)"
dir = "desktop/e2e"
run = "npx playwright test"

[tasks."docs:serve"]
description = "Serve documentation site locally"
run = "zensical serve"

[tasks."docs:build"]
description = "Build documentation site with llms.txt"
run = ["zensical build", "./scripts/generate-llmstxt.sh"]

[tasks.integration]
description = "Run Docker-based integration tests"
depends = ["build"]
run = "docker build -f Dockerfile.test -t hive-integration-test . && docker run --rm hive-integration-test"

[tasks."container"]
description = "Build Docker image and run ephemeral container"
depends = ["build"]
run = "docker run --rm -it -e CLAUDE_CREDENTIALS=\"$CLAUDE_CREDENTIALS\" $(docker build -q .)"
