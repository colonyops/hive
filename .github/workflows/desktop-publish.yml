name: Build and Publish Desktop

# Releases for the Wails desktop app are fully DECOUPLED from the CLI release
# (.github/workflows/publish.yml). This workflow has its own version scheme and
# its own tag namespace (`desktop-v*`), so bumping/publishing the desktop app
# never touches the CLI's `v*` tags or its Homebrew/GoReleaser pipeline.
#
# macOS only, universal (arm64 + amd64). Release builds are signed with a
# Developer ID Application certificate and notarized + stapled, so the .app the
# updater downloads and swaps in place launches cleanly through Gatekeeper with
# no xattr quarantine dance. A SHA256SUMS sidecar is published alongside the zip
# so the in-app updater integrity-verifies each download (the custom provider
# sets ChecksumAsset: "SHA256SUMS").
#
# Required repository secrets:
#   MACOS_CERTIFICATE      base64-encoded Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD  password for that .p12
#   MACOS_SIGN_IDENTITY    e.g. "Developer ID Application: Acme (TEAMID)"
#   AC_API_KEY_ID          App Store Connect API key id
#   AC_API_ISSUER_ID       App Store Connect API issuer id
#   AC_API_KEY             base64-encoded App Store Connect API .p8 key
# App Store Connect API key auth is preferred over Apple-ID + app-specific
# password: no 2FA friction in CI.

permissions:
  contents: write # create tags + releases and upload assets

on:
  workflow_dispatch:
    inputs:
      semverbump:
        description: "Which version to bump by (ignored for the first release)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: "Release Desktop (macOS)"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need the full tag history to compute the next version

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest=$(git tag --list 'desktop-v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            # First desktop release: publish the version already committed in
            # Info.plist rather than bumping past it.
            version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" desktop/build/darwin/Info.plist)
          else
            current="${latest#desktop-v}"
            IFS='.' read -r major minor patch <<< "$current"
            case "${{ inputs.semverbump }}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            version="${major}.${minor}.${patch}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$version" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Next desktop version: $version (tag desktop-v$version)"

      - name: Fail if tag already exists
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Set up mise (provides the pinned wails3)
        uses: jdx/mise-action@v4

      - name: Stamp app version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" desktop/build/darwin/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" desktop/build/darwin/Info.plist

      - name: Build & package universal .app
        working-directory: desktop
        # Stamp the build info into the binary (desktop/buildinfo.go) so the
        # running app reports this exact version/commit/date in System settings
        # and can link to this release. Info.plist is stamped separately above.
        env:
          HIVE_DESKTOP_VERSION: ${{ steps.version.outputs.version }}
          HIVE_DESKTOP_COMMIT: ${{ github.sha }}
          HIVE_DESKTOP_DATE: ${{ steps.version.outputs.date }}
        run: wails3 task darwin:package:universal

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          # Use a dedicated, ephemeral keychain so the runner's login keychain
          # is never touched and the imported key is discarded with the runner.
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PWD" \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null
          # Make the keychain visible to codesign's default search list.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Codesign the .app (Developer ID, hardened runtime)
        working-directory: desktop
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force --deep --timestamp --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --sign "$MACOS_SIGN_IDENTITY" \
            bin/hive-desktop.app
          codesign --verify --strict --verbose=2 bin/hive-desktop.app

      - name: Notarize and staple
        working-directory: desktop
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          set -euo pipefail
          # notarytool needs the .p8 API key on disk.
          KEY_PATH="$RUNNER_TEMP/ac_api_key.p8"
          echo "$AC_API_KEY" | base64 --decode > "$KEY_PATH"

          # Notarization operates on a zip of the bundle; the resulting ticket
          # is stapled onto the .app itself afterwards.
          ditto -c -k --keepParent bin/hive-desktop.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple bin/hive-desktop.app
          xcrun stapler validate bin/hive-desktop.app
          rm -f "$KEY_PATH" "$RUNNER_TEMP/notarize.zip"

      - name: Zip the stapled .app and compute checksums
        working-directory: desktop/bin
        run: |
          set -euo pipefail
          ZIP="Hive-desktop-${{ steps.version.outputs.version }}-macos-universal.zip"
          # Re-zip AFTER stapling so the published artifact carries the ticket.
          ditto -c -k --keepParent hive-desktop.app "$ZIP"
          # SHA256SUMS must list the zip's basename: the updater's checksum
          # parser compares basenames, not paths.
          shasum -a 256 "$ZIP" > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=$(cat <<'EOF'
          Universal macOS build (Apple Silicon + Intel) of the Hive desktop app.

          Signed with an Apple Developer ID and notarized, so it launches without
          any quarantine workaround. Copy **Hive.app** to `/Applications` and open it.

          The app can update itself: enable **Automatic updates** in System settings,
          or use **Check for updates**. A `SHA256SUMS` sidecar accompanies the build
          so the in-app updater integrity-verifies each download.

          Requires macOS 12.0 or later.
          EOF
          )
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "Hive Desktop ${{ steps.version.outputs.version }}" \
            --notes "$notes" \
            "desktop/bin/Hive-desktop-${{ steps.version.outputs.version }}-macos-universal.zip" \
            "desktop/bin/SHA256SUMS"
