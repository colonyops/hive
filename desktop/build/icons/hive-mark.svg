<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dock icons are not masked by the system: the rounded-square body must be
       drawn at the Apple icon-grid inset (824px centered on a 1024 canvas)
       with transparent margins, or the icon renders oversized in the Dock. -->
  <rect x="100" y="100" width="824" height="824" rx="195" fill="#0a0a0b"/>
  <g transform="translate(512 512) scale(0.8) translate(-512 -512)">
    <path d="M512 166 780 320v384L512 858 244 704V320z" fill="none" stroke="#f59e0b" stroke-linejoin="round" stroke-width="64"/>
    <path d="M388 420 500 512 388 604" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round" stroke-width="58"/>
    <rect x="544" y="576" width="128" height="50" rx="25" fill="#f59e0b"/>
  </g>
</svg>
