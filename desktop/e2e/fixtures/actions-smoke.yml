# Copied to a per-server private fixture and expanded by serve.sh. The checked-in
# placeholders are never used directly so browser edits cannot dirty this file.
version: 1
actions:
  - id: smoke-__RUN_ID__-pr
    label: Smoke PR
    type: shell
    show_in_detail: true
    applies_to: [pr]
    command_template: "printf smoke-stdout; printf smoke-stderr >&2"
  - id: smoke-__RUN_ID__-issue
    label: Smoke issue
    type: shell
    show_in_detail: true
    applies_to: [issue]
    command_template: "/usr/bin/true"
  - id: smoke-__RUN_ID__-message
    label: Smoke message
    type: publish-message
    show_in_detail: true
    applies_to: [pr]
    topic: "smoke.__RUN_ID__"
    message_template: "message for {{ .Payload.id }}"
  - id: smoke-__RUN_ID__-template-launch
    label: Smoke templated launch
    type: launch-session
    show_in_detail: true
    applies_to: [pr]
    repo_template: "__REMOTE__"
    prompt_template: "launch {{ .Payload.id }}"
  - id: smoke-__RUN_ID__-dialog-launch
    label: Smoke dialog launch
    type: launch-session
    show_in_detail: true
    applies_to: [issue]
    prompt_template: "launch {{ .Payload.id }}"
  - id: smoke-__RUN_ID__-failed-shell
    label: Smoke failing shell
    type: shell
    show_in_detail: true
    applies_to: [pr]
    command_template: "printf failing-stdout; printf failing-stderr >&2; exit 17"
  - id: smoke-__RUN_ID__-failed-launch
    label: Smoke failing launch
    type: launch-session
    show_in_detail: true
    applies_to: [issue]
    repo_template: "__MISSING_REMOTE__"
    prompt_template: "fail {{ .Payload.id }}"
  - id: smoke-__RUN_ID__-hidden
    label: Hidden smoke action
    type: shell
    show_in_detail: false
    command_template: "/usr/bin/true"
