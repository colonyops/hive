# Isolated composition fixture for source-to-commit.spec.ts.
# The function node ensures this smoke test uses the production browser Worker
# transport before the feed terminal's output is committed by Go.
version: 1
name: Source to Commit Smoke
nodes:
  - { id: fixture-source, type: github-source, kind: search, query: "is:open" }
  - { id: worker-transform, type: function, on_message: "return msg" }
  - { id: smoke-feed, type: feed, name: "Smoke feed" }
wires:
  - { from: fixture-source, to: worker-transform }
  - { from: worker-transform, to: smoke-feed }
